version: "3.9"

services:
  app:
    build: .
    container_name: neodataremoval
    restart: unless-stopped
    ports:
      - "${PUBLIC_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - TRUST_PROXY=1
    volumes:
      - db_data:/app/db_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth/me"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db_data:
    driver: local
