version: "3.9"

services:
  app:
    build: .
    container_name: neodataremoval
    restart: unless-stopped
    ports:
      - "${PUBLIC_PORT:-3060}:3060"
    environment:
      - NODE_ENV=production
      - PORT=3060
      - TRUST_PROXY=1
      # Secrets are auto-generated on first boot and saved to the db_data volume.
      # You do NOT need to set ENCRYPTION_KEY or JWT_SECRET here — the app handles it.
      #
      # If you prefer to manage secrets yourself (e.g. via Docker secrets or a vault),
      # uncomment and fill in:
      # - ENCRYPTION_KEY=<64-char hex>
      # - JWT_SECRET=<long random string>
    volumes:
      - db_data:/app/db_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3060/api/auth/me"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  db_data:
    driver: local
