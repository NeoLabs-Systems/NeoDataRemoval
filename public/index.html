<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NeoDataRemoval</title>
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

<div id="app-shell">
  <div id="mobile-overlay"></div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <span class="sidebar-logo-text">NeoDataRemoval</span>
    </div>

    <div class="sidebar-compose">
      <button class="btn-compose" id="btnNewScan">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
        New Scan
      </button>
    </div>

    <div class="sidebar-section">
      <a class="nav-item" data-view="dashboard" href="#dashboard">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a class="nav-item" data-view="exposures" href="#exposures">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Exposures
        <span class="nav-badge" id="badgeExposures" style="display:none"></span>
      </a>
      <a class="nav-item" data-view="removals" href="#removals">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Removals
      </a>
      <a class="nav-item" data-view="brokers" href="#brokers">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
        Data Brokers
      </a>
      <a class="nav-item" data-view="profiles" href="#profiles">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        My Profiles
      </a>
    </div>

    <div class="sidebar-footer">
      <button class="sidebar-footer-action" id="btn-settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        Settings
      </button>
      <button class="sidebar-footer-action" id="btnLogout">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <div id="main">
    <div id="topbar">
      <button class="icon-btn" id="mobile-menu-btn" aria-label="Toggle menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h2 id="topbarTitle">Dashboard</h2>
      <span id="topbar-user"></span>
    </div>

    <div id="content">
      <div class="spinner-wrap" id="spinner"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- Scan panel (background toast) -->
<div class="scan-panel hidden" id="scanModal">
  <div class="scan-panel-header">
    <span class="scan-panel-title">New Scan</span>
    <button class="icon-btn icon-btn-xs" id="closeScanModal" title="Dismiss">✕</button>
  </div>
  <div class="scan-panel-body">
    <div class="field" id="scanProfileField">
      <label>Profile</label>
      <select id="scanProfileSelect"><option value="">Loading…</option></select>
    </div>
    <div class="scan-progress hidden" id="scanProgress">
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
      <p class="scan-status-text" id="scanStatusText">Starting scan…</p>
    </div>
    <div class="error" id="scanErr"></div>
  </div>
  <div class="scan-panel-footer">
    <button class="btn-secondary btn-sm" id="cancelScan">Cancel</button>
    <button class="btn-primary btn-sm" id="startScanBtn">Start Scan</button>
  </div>
</div>

<!-- Settings overlay -->
<div class="modal-overlay hidden" id="settings-overlay">
  <div class="settings-modal">
    <div class="settings-header">
      <h2>Settings</h2>
      <button class="icon-btn" id="settings-close">✕</button>
    </div>
    <div class="settings-body">
      <div class="settings-tabs">
        <button class="stab active" data-panel="scanning">Scanning</button>
        <button class="stab" data-panel="ai">AI</button>
        <button class="stab" data-panel="account">Account</button>
        <button class="stab" data-panel="security">Security</button>
      </div>
      <div class="settings-content" id="settings-content"></div>
    </div>
  </div>
</div>

<script src="/js/app.js" type="module"></script>
</body>
</html>
