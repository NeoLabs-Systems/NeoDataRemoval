<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>NeoDataRemoval — Login</title>
        <link rel="icon" href="/icon.svg" type="image/svg+xml" />
        <link rel="stylesheet" href="/css/app.css" />
        <style>
            .setup-banner {
                display: flex;
                align-items: center;
                gap: 8px;
                background: rgba(124, 58, 237, 0.15);
                border: 1px solid rgba(124, 58, 237, 0.4);
                border-radius: 8px;
                padding: 10px 14px;
                margin-bottom: 16px;
                color: #c084fc;
                font-size: 13px;
                line-height: 1.4;
            }
            .setup-banner svg {
                flex-shrink: 0;
                opacity: 0.85;
            }
            .setup-banner.hidden {
                display: none;
            }
        </style>
    </head>
    <body>
        <div id="login-page">
            <div class="login-card">
                <div class="login-logo">
                    <div class="login-logo-icon">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="20"
                            height="20"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="#fff"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path
                                d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"
                            />
                        </svg>
                    </div>
                    <span class="login-logo-text">NeoDataRemoval</span>
                </div>

                <!-- First-run setup banner — shown only when no account exists yet -->
                <div class="setup-banner hidden" id="setup-banner">
                    <svg
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg>
                    <span
                        >First-time setup — create your admin account to get
                        started.</span
                    >
                </div>

                <div class="login-tabs" id="tab-switcher">
                    <div class="login-tab active" id="tab-login">Sign In</div>
                    <div
                        class="login-tab"
                        id="tab-register"
                        style="display: none"
                    >
                        Create Account
                    </div>
                </div>

                <!-- Sign In -->
                <form class="login-form" id="login-form" autocomplete="on">
                    <div class="form-group">
                        <label for="login-id">Username or Email</label>
                        <input
                            id="login-id"
                            name="username"
                            type="text"
                            autocomplete="username"
                            placeholder="username or email"
                            required
                        />
                    </div>
                    <div class="form-group">
                        <label for="login-pass">Password</label>
                        <input
                            id="login-pass"
                            name="password"
                            type="password"
                            autocomplete="current-password"
                            placeholder="••••••••"
                            required
                        />
                    </div>
                    <div
                        class="form-group"
                        id="totp-group"
                        style="display: none"
                    >
                        <label for="login-totp">Authenticator Code</label>
                        <input
                            id="login-totp"
                            name="totp"
                            type="text"
                            inputmode="numeric"
                            autocomplete="one-time-code"
                            placeholder="6-digit code"
                            maxlength="6"
                        />
                    </div>
                    <div class="login-error" id="login-error"></div>
                    <button class="btn-submit" type="submit" id="login-btn">
                        Sign In
                    </button>
                </form>

                <!-- Register (first-time setup only) -->
                <form
                    class="login-form"
                    id="register-form"
                    autocomplete="off"
                    style="display: none"
                >
                    <div class="form-group">
                        <label for="reg-username">Username</label>
                        <input
                            id="reg-username"
                            name="username"
                            type="text"
                            placeholder="choose a username"
                            autocomplete="username"
                            required
                        />
                    </div>
                    <div class="form-group">
                        <label for="reg-email">
                            Email
                            <span style="font-weight: 400; opacity: 0.6"
                                >(for monthly reports)</span
                            >
                        </label>
                        <input
                            id="reg-email"
                            name="email"
                            type="email"
                            placeholder="you@example.com"
                            autocomplete="email"
                            required
                        />
                    </div>
                    <div class="form-group">
                        <label for="reg-pass">Password</label>
                        <input
                            id="reg-pass"
                            name="password"
                            type="password"
                            autocomplete="new-password"
                            placeholder="min 10 characters"
                            required
                        />
                    </div>
                    <div class="form-group">
                        <label for="reg-pass2">Confirm Password</label>
                        <input
                            id="reg-pass2"
                            name="password2"
                            type="password"
                            autocomplete="new-password"
                            placeholder="repeat password"
                            required
                        />
                    </div>
                    <div class="login-error" id="reg-error"></div>
                    <button class="btn-submit" type="submit" id="register-btn">
                        Create Account
                    </button>
                    <p class="login-hint">
                        This is the only account that can be created. It will
                        have full admin access.
                    </p>
                </form>
            </div>
        </div>

        <script src="/js/login.js"></script>
    </body>
</html>
