<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NeoDataRemoval — Login</title>
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

<div id="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <span class="login-logo-text">NeoDataRemoval</span>
    </div>

    <div class="login-tabs" id="tab-switcher">
      <div class="login-tab active" id="tab-login">Sign In</div>
      <div class="login-tab" id="tab-register">Create Account</div>
    </div>

    <!-- Sign In -->
    <form class="login-form" id="login-form" autocomplete="on">
      <div class="form-group">
        <label for="login-id">Username or Email</label>
        <input id="login-id" name="username" type="text" autocomplete="username" placeholder="username or email" required>
      </div>
      <div class="form-group">
        <label for="login-pass">Password</label>
        <input id="login-pass" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
      </div>
      <div class="form-group" id="totp-group" style="display:none">
        <label for="login-totp">Authenticator Code</label>
        <input id="login-totp" name="totp" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="6-digit code" maxlength="6">
      </div>
      <div class="login-error" id="login-error"></div>
      <button class="btn-submit" type="submit">Sign In</button>
    </form>

    <!-- Register -->
    <form class="login-form" id="register-form" autocomplete="off" style="display:none">
      <div class="form-group">
        <label for="reg-username">Username</label>
        <input id="reg-username" name="username" type="text" placeholder="choose a username" required>
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input id="reg-email" name="email" type="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="reg-pass">Password</label>
        <input id="reg-pass" name="password" type="password" autocomplete="new-password" placeholder="min 10 characters" required>
      </div>
      <div class="login-error" id="reg-error"></div>
      <button class="btn-submit" type="submit">Create Account</button>
      <p class="login-hint">First account created becomes admin.</p>
    </form>

  </div>
</div>

<script src="/js/login.js"></script>
</body>
</html>
